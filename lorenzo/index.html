<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2a2622">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="icon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
<link rel="manifest" href="manifest-lorenzo.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="IE">
<title>InternoUno Experience · Via Lorenzo il Magnifico</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Michroma&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;
  --surface:#ffffff;
  --sidebar:#f0efe9;
  --border:rgba(0,0,0,.08);
  --border-s:rgba(0,0,0,.15);
  --text:#1a1a1a;
  --muted:#666;
  --faint:#999;
  --orange:#FF6628;
  --orange-bg:#FFEDE4;
  --blue:#1a4a7a;  --blue-bg:#eef4fd;
  --green:#1a7a4a; --green-bg:#e8f5ee;
  --red:#b83232;   --red-bg:#fdf0f0;
  --dark:#1a1a1a;
  --radius:12px;
  --tabbar-h:62px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);
  font-size:16px;line-height:1.5;
  max-width:520px;margin:0 auto;
  padding-bottom:calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 12px);
}
a{color:var(--blue)}
/* ---------- header scuro con wordmark ---------- */
header{
  position:sticky;top:0;z-index:20;
  background:#2a2622;
  border-radius:0 0 20px 20px;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px calc(14px);
  padding-top:calc(14px + env(safe-area-inset-top));
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{display:block;flex-shrink:0;width:42px;height:31px;object-fit:contain}
.wordmark{
  font-family:'Michroma',-apple-system,sans-serif;font-weight:400;
  font-size:17px;text-transform:uppercase;letter-spacing:.04em;color:#fff;
  display:flex;flex-direction:column;align-items:flex-start;
}
.wordmark .name{display:block}
.wordmark .uno{color:var(--orange)}
.wordmark .tagline{
  display:block;font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:700;font-size:.6rem;letter-spacing:.1em;
  color:#fff;text-transform:uppercase;margin-top:4px;line-height:1.35;
}
.wordmark .tagline .u{color:var(--orange)}
.wordmark .addr{
  display:block;font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-weight:500;font-size:.6rem;letter-spacing:.1em;
  color:rgba(255,255,255,.55);text-transform:uppercase;margin-top:1px;line-height:1.35;
}
.lang-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.25);
  background:rgba(255,255,255,.08);font-size:17px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer}
.lang-modal-overlay{position:fixed;inset:0;background:rgba(20,17,14,.55);z-index:700;
  display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;
  transition:opacity .2s}
.lang-modal-overlay.show{opacity:1;pointer-events:auto}
.lang-modal{width:100%;max-width:480px;background:#fff;border-radius:20px 20px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));
  transform:translateY(20px);transition:transform .25s;max-height:70vh;overflow-y:auto}
.lang-modal-overlay.show .lang-modal{transform:translateY(0)}
.lang-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.lang-modal-head h3{font-size:16px;margin:0}
.lang-modal-close{width:30px;height:30px;border-radius:50%;border:none;background:var(--bg2,#f0efe9);
  font-size:14px;cursor:pointer}
.lang-modal-list{display:flex;flex-direction:column;gap:4px}
.lang-row{display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:12px;
  border:none;background:none;width:100%;text-align:left;font-size:15px;cursor:pointer;color:inherit}
.lang-row:active{background:rgba(0,0,0,.04)}
.lang-row.on{background:rgba(255,102,40,.1);font-weight:700;color:var(--orange)}
.lang-row .flag{font-size:20px}
.lang-row .check{margin-left:auto;color:var(--orange)}
.wifi-card{padding:4px 2px 8px}
.wifi-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.wifi-row span{color:var(--muted);font-size:.9rem}
.wifi-row b{font-size:1rem;letter-spacing:.02em}
#wifiCopyBtn{width:100%;margin-top:16px;background:var(--orange);color:#fff;border:none;border-radius:var(--radius);
  padding:13px;font-size:.95rem;font-weight:700;cursor:pointer}
#wifiCopyBtn.copied{background:#3c9a5f}
/* ---------- section headers ---------- */
.targa{margin:26px 16px 10px;text-align:left;background:none;border:none;box-shadow:none;padding:0}
.targa h2{font-size:1.25rem;font-weight:700;letter-spacing:-.01em;color:var(--text);text-transform:none}
.targa p{font-size:.8rem;color:var(--muted);margin-top:2px}
/* ---------- screens & cards ---------- */
.screen{display:none;animation:fade .18s ease}
.screen.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){.screen{animation:none}}
.wrap{padding:0 16px}
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 16px;margin-bottom:10px;
}
/* hero */
.hero{padding:22px 16px 2px;text-align:left}
.hero .benvenuti{font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--orange);font-weight:700;margin-bottom:4px}
.hero h1{font-size:1.7rem;font-weight:700;letter-spacing:-.02em;line-height:1.1;margin:0 0 4px}
.hero p{color:var(--muted);font-size:.9rem}
/* quick actions */
.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;padding:16px 16px 2px}
.quick a, .quick button{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:12px 4px;text-decoration:none;color:var(--text);
  font-size:.68rem;font-weight:600;transition:transform .15s;
  font-family:inherit;cursor:pointer;
}
.quick a span.i, .quick button span.i{width:24px;height:24px;display:flex;align-items:center;justify-content:center;color:var(--text)}
.quick a span.i svg, .quick button span.i svg{width:24px;height:24px}
.quick a:active, .quick button:active{transform:scale(.96);border-color:var(--border-s)}
/* accordion */
details.acc{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  margin:0 16px 8px;overflow:hidden;
}
details.acc[open]{border-color:var(--border-s)}
details.acc summary{
  list-style:none;display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;font-weight:600;font-size:.93rem;
}
details.acc summary::-webkit-details-marker{display:none}
details.acc summary .i{font-size:1.25rem}
details.acc summary::after{content:"+";margin-left:auto;color:var(--orange);font-size:1.25rem;font-weight:400}
details.acc[open] summary::after{content:"–"}
details.acc .body{padding:0 16px 15px;color:var(--muted);font-size:.9rem}
details.acc .body b,details.acc .body strong{color:var(--text)}
details.acc .body p+p{margin-top:8px}
/* pill row (biglietti) */
.pills{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.pill{background:var(--blue-bg);border:1px solid var(--blue);border-radius:16px;padding:4px 11px;font-size:.78rem;font-weight:700;color:var(--blue)}
.pill small{font-weight:500;opacity:.75}
/* numeri utili */
.numrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.numrow:last-child{border-bottom:0}
.numrow .n{margin-left:auto;font-weight:700;color:var(--red);text-decoration:none;font-size:.98rem}
/* ristoranti / poi */
.poi{display:block;text-decoration:none;color:inherit}
.poi .top{display:flex;align-items:baseline;gap:8px;padding-right:40px}
.poi h3{font-size:.98rem;font-weight:700;color:var(--text)}
.poi .star{margin-left:auto;font-size:.8rem;font-weight:700;color:var(--amber,#7a5a00);background:#fef8e8;border-radius:8px;padding:1px 7px;white-space:nowrap}
.poi .addr{font-size:.78rem;color:var(--faint);margin:2px 0 3px}
.poi .desc{font-size:.87rem;color:var(--muted)}
.badge{display:inline-block;font-size:.62rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--green);background:var(--green-bg);border-radius:6px;padding:2px 7px;margin-left:8px;vertical-align:middle}
/* buttons & map */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--dark);color:#fff;border:0;border-radius:10px;
  padding:13px;font-family:inherit;font-size:.93rem;font-weight:600;
  text-decoration:none;margin-bottom:10px;width:100%;cursor:pointer;
}
.btn.alt{background:var(--surface);color:var(--text);border:1px solid var(--border-s)}
.map-wrap{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:10px;position:relative;z-index:1}
#map, #foodMap{height:280px;width:100%;background:#e9e6df}
.leaflet-control-attribution{font-size:9px !important}
.poi-pin{width:28px;height:28px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.35)}
.poi-pin span{transform:rotate(45deg);font-size:13px;line-height:1}
.poi-pin.cat-casa{background:var(--orange)}
.m-badge{display:inline-flex;align-items:center;justify-content:center;width:1.3em;height:1.3em;
  background:#e2231a;color:#fff;font-weight:900;font-family:Arial,Helvetica,sans-serif;
  font-size:.9em;border-radius:3px;vertical-align:-3px;line-height:1}
.t-badge{display:inline-flex;align-items:center;justify-content:center;width:1.3em;height:1.3em;
  background:#1a1a1a;color:#fff;font-weight:900;font-family:Arial,Helvetica,sans-serif;
  font-size:.9em;border-radius:3px;vertical-align:-3px;line-height:1}
.poi-pin.cat-metro{background:#e2231a;border-radius:4px;transform:none;width:24px;height:24px}
.poi-pin.cat-metro span{transform:none;font-weight:900;font-size:15px;font-family:Arial,Helvetica,sans-serif}
.poi-pin.cat-spesa{background:#4a9e6b}
.poi-pin.cat-bancomat{background:#8b5fbf}
.poi-pin.cat-lavanderia{background:#2f9bb0}
.poi-pin.cat-farmacia{background:#e0555f}
.poi-pin.cat-garage{background:#6b6b6b}
.poi-pin.cat-food{background:var(--orange)}
.poi-pin.cat-ospedale{background:#d32f2f}
.poi-pin.cat-posta{background:#c9960c}
.poi-pin.cat-tabacchi{background:#1a1a1a;border-radius:4px;transform:none;width:24px;height:24px}
.poi-pin.cat-tabacchi span{transform:none;font-weight:900;font-size:15px;font-family:Arial,Helvetica,sans-serif}
.poi-tooltip{background:rgba(30,28,25,.92) !important;border:none !important;color:#fff !important;
  font-family:inherit !important;font-size:11px !important;font-weight:600;padding:3px 8px !important;
  border-radius:6px !important;box-shadow:none !important}
.poi-tooltip::before{display:none !important}
.card.poi{position:relative}
.card.poi .navbtn{position:absolute;top:12px;right:12px;width:34px;height:34px;border-radius:50%;
  background:rgba(255,102,40,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card.poi .navbtn svg{width:16px;height:16px;stroke:var(--orange)}
.book-btn{display:inline-block;margin-top:8px;font-size:.78rem;font-weight:700;color:var(--orange);
  border:1px solid rgba(255,102,40,.35);border-radius:20px;padding:5px 12px;text-decoration:none}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;border:1px solid var(--border);background:var(--surface);border-radius:20px;
  padding:6px 13px;font-size:.78rem;font-weight:600;color:var(--muted);white-space:nowrap;cursor:pointer}
.chip.on{background:var(--orange);border-color:var(--orange);color:#fff}
.subtab-row{display:flex;gap:8px;padding:2px 16px 14px}
.subtab{flex:1;padding:10px;border-radius:12px;border:1px solid var(--border);background:var(--surface);
  font-size:.85rem;font-weight:700;color:var(--muted);cursor:pointer}
.subtab.on{background:var(--orange);border-color:var(--orange);color:#fff}
.sub-panel{display:none}
.sub-panel.on{display:block}
.filter-select-btn{display:flex;align-items:center;gap:8px;width:100%;text-align:left;
  border:1px solid var(--border);background:var(--surface);border-radius:12px;
  padding:11px 14px;font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:8px;cursor:pointer}
.filter-select-btn::after{content:'▾';margin-left:auto;color:var(--muted)}
.poi-price{margin-left:6px;font-size:.72rem;font-weight:700;color:var(--orange);
  border:1px solid rgba(255,102,40,.35);border-radius:8px;padding:2px 8px;background:rgba(255,102,40,.06);white-space:nowrap}
.poi-price.pushright{margin-left:auto}
/* chat */
#chatlog{min-height:40vh;display:flex;flex-direction:column;gap:9px;padding:4px 0 12px}
.msg{max-width:84%;padding:10px 14px;border-radius:16px;font-size:.92rem}
.msg.guest{align-self:flex-end;background:var(--dark);color:#fff;border-bottom-right-radius:4px}
.msg.bot{align-self:flex-start;background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.bot a{color:var(--orange);font-weight:700}
.chatbar{display:flex;gap:8px;position:sticky;bottom:calc(var(--tabbar-h) + env(safe-area-inset-bottom) + 10px)}
.chatbar input{
  flex:1;border:1px solid var(--border-s);border-radius:22px;padding:12px 16px;
  font-family:inherit;font-size:1rem;background:var(--surface);color:var(--text);
}
.chatbar input:focus{outline:none;border-color:var(--orange)}
.chatbar button{
  background:var(--orange);color:#fff;border:0;border-radius:50%;width:46px;height:46px;
  font-size:1.15rem;cursor:pointer;flex-shrink:0;
}
/* tab bar */
nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);z-index:30;width:100%;max-width:520px;
  background:rgba(255,255,255,.96);backdrop-filter:blur(10px);
  border-top:1px solid var(--border);
  display:flex;height:calc(var(--tabbar-h) + env(safe-area-inset-bottom));
  padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1;background:none;border:0;font-family:inherit;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:.62rem;font-weight:600;color:var(--faint);transition:color .2s;
}
nav button .i{width:23px;height:23px;display:flex;align-items:center;justify-content:center;color:var(--faint);transition:color .2s}
nav button .i svg{width:23px;height:23px}
nav button.on{color:var(--orange)}
nav button.on .i{color:var(--orange)}
footer{padding:24px 16px 14px;text-align:left;font-size:.82rem;color:var(--muted)}
footer b{color:var(--text)}
.note{font-size:.78rem;color:var(--faint);text-align:center;margin:8px 16px}

</style>
</head>

    {i:'🕙',t:'Check-out antes de las 10:00',b:'<p>Si no hay personal al salir, deja la llave en el mostrador de recepción.</p>'},
    {i:'🚗',t:'Aparcamiento',b:'<p>Acuerdo con <b>Garage Bologna</b>, a unos 200 m: Via Lorenzo il Magnifico 83, tel <b>+39 06 4424 2664</b>.<br>Lun–Sáb 6:00–01:00 · Dom 6:00–10:00 y 19:00–01:00</p><p>25€/día para vehículos estándar (tarifa superior para coches de gran valor o de gran tamaño).</p><p>Hay un garaje más cercano, justo a la derecha de nuestra entrada, pero sus tarifas son mucho más altas: tú decides.</p>'},
    {i:'🧳',t:'Consigna de equipaje',b:'<p>Puedes dejar el equipaje gratis en el cuartito de la puerta blanca a la derecha de la recepción y recogerlo durante el día. Lleva la llave contigo cuando salgas: la dejarás en el mostrador de recepción solo a tu regreso, una vez recogido el equipaje.</p><p>Somos un alojamiento pequeño, con pocas habitaciones y muy seguro — el depósito, sin embargo, no está vigilado, por lo que no podemos responsabilizarnos de lo que se deje allí: para mayor tranquilidad, te recomendamos llevar contigo los objetos que más valoras.</p>'},
    {i:'🚇',t:'Metro, bus y billetes',b:'<p><b>Metro/Estación Tiburtina:</b> Línea B, a 10 m (menos de 1 min a pie) — también estación de tren de Alta Velocidad y regionales. Termini a 4 paradas, Coliseo a 6.<br>Horario metro: dom–jue 5:30–23:30 · vie–sáb 5:30–01:30</p><p><b>Bus:</b> parada a pocos metros de la entrada. Usa Google Maps para la mejor ruta.</p><div class="pills"><span class="pill">€1,50 <small>100 min</small></span><span class="pill">€7 <small>24H</small></span><span class="pill">€12,50 <small>48H</small></span><span class="pill">€18 <small>72H</small></span></div><p style="margin-top:8px">🎟️ En el metro, estancos, quioscos o con la app <a href="https://www.ticketappy.it">TicketAppy</a>.</p>'},
    {i:'📺',t:'Netflix gratis',b:'<p>Netflix es gratis: pulsa el botón dedicado del mando, o selecciona la entrada HDMI dedicada en la TV para acceder al menú y elige el icono de Netflix.</p><p>Si encuentras la cuenta desconectada, envíanos por WhatsApp una foto del QR en pantalla: lo reactivamos enseguida.</p>'},
    {i:'🛁',t:'Jacuzzi en la habitación',b:'<p>Tu habitación cuenta con bañera de hidromasaje, lista para usar e incluida en la estancia.</p><p>Presta atención al interruptor de encendido: si el hidromasaje no arranca, comprueba que el interruptor junto a la luz del baño esté activado.</p>'},

  acc:[
    {i:'🕐',t:'Check-in à partir de 13h00',b:'<p>Avant 8h00, il n’y a pas de personnel sur place. À partir de cette heure, vous pouvez venir déposer vos bagages, mais la chambre ne sera pas disponible tant qu’elle n’aura pas été libérée par le client précédent et nettoyée (avant 13h00).</p><p>Si vous ne trouvez pas notre personnel, vous trouverez dans le coffre-fort une clé unique pour ouvrir la porte d’entrée : utilisez-la pour entrer, puis remettez-la dans le coffre.</p><p>Vous pouvez laisser vos bagages dans le petit local juste après l’entrée, à droite.</p><p>À votre retour, vous trouverez la clé de votre chambre dans le même coffre.</p>'},
    {i:'🕙',t:'Départ avant 10h00',b:'<p>Si le personnel n\u2019est pas présent à votre départ, laissez la clé sur le comptoir de la réception.</p>'},
    {i:'🚗',t:'Parking',b:'<p>Accord avec <b>Garage Bologna</b>, à environ 200 m : Via Lorenzo il Magnifico 83, tél <b>+39 06 4424 2664</b>.<br>Lun–Sam 6h00–01h00 · Dim 6h00–10h00 et 19h00–01h00</p><p>25€/jour pour les véhicules standards (tarif plus élevé pour les voitures de grande valeur ou de grande taille).</p><p>Il y a un garage plus proche, juste à droite de notre entrée, mais ses tarifs sont bien plus élevés : à vous de voir.</p>'},
    {i:'🧳',t:'Consigne à bagages',b:'<p>Vous pouvez laisser gratuitement vos bagages dans le petit local à la porte blanche, à droite de la réception, et les récupérer dans la journée. Emportez la clé avec vous en sortant : vous ne la laisserez sur le comptoir de la réception qu’à votre retour, une fois les bagages récupérés.</p><p>Nous sommes un petit établissement avec peu de chambres, très sûr — la consigne, en revanche, n’est pas surveillée, nous ne pouvons donc pas être responsables de ce qui y est laissé : pour votre tranquillité, nous vous recommandons d’emporter avec vous vos objets auxquels vous tenez le plus.</p>'},
    {i:'🚇',t:'Métro, bus et billets',b:'<p><b>Métro/Gare de Tiburtina :</b> Ligne B, à 10 m (moins d’1 min à pied) — aussi une gare pour les trains à grande vitesse et régionaux. Termini à 4 arrêts, Colisée à 6.<br>Horaires métro : dim–jeu 5h30–23h30 · ven–sam 5h30–01h30</p><p><b>Bus :</b> arrêt à quelques mètres de l\u2019entrée. Utilisez Google Maps pour le meilleur itinéraire.</p><div class="pills"><span class="pill">1,50 € <small>100 min</small></span><span class="pill">7 € <small>24H</small></span><span class="pill">12,50 € <small>48H</small></span><span class="pill">18 € <small>72H</small></span></div><p style="margin-top:8px">🎟️ Dans le métro, les bureaux de tabac, les kiosques ou avec l\u2019appli <a href="https://www.ticketappy.it">TicketAppy</a>.</p>'},

  acc:[
    {i:'🕐',t:'Check-in ab 13:00 Uhr',b:'<p>Vor 8:00 Uhr ist kein Personal vor Ort. Ab dieser Uhrzeit können Sie vorbeikommen, um Ihr Gepäck abzugeben, aber das Zimmer steht erst zur Verfügung, wenn es vom vorherigen Gast geräumt und gereinigt wurde (bis 13:00 Uhr).</p><p>Falls Sie unser Personal nicht antreffen, finden Sie im Safe einen einzelnen Schlüssel für die Eingangstür: benutzen Sie ihn zum Eintreten und legen Sie ihn danach wieder in den Safe.</p><p>Sie können Ihr Gepäck im kleinen Raum gleich nach dem Eingang rechts lassen.</p><p>Bei Ihrer Rückkehr finden Sie im selben Safe den Schlüssel zu Ihrem Zimmer.</p>'},
    {i:'🕙',t:'Check-out bis 10:00 Uhr',b:'<p>Falls bei der Abreise niemand vom Personal da ist, legen Sie den Schlüssel einfach an der Rezeptionstheke ab.</p>'},
    {i:'🚗',t:'Parken',b:'<p>Vereinbarung mit <b>Garage Bologna</b>, ca. 200 m entfernt: Via Lorenzo il Magnifico 83, Tel. <b>+39 06 4424 2664</b>.<br>Mo–Sa 6:00–01:00 · So 6:00–10:00 und 19:00–01:00</p><p>25€/Tag für Standardfahrzeuge (höherer Tarif für besonders wertvolle oder große Fahrzeuge).</p><p>Es gibt eine nähere Garage direkt rechts von unserem Eingang, deren Preise jedoch deutlich höher sind — Ihre Entscheidung.</p>'},
    {i:'🧳',t:'Gepäckaufbewahrung',b:'<p>Sie können Ihr Gepäck kostenlos im kleinen Raum mit der weißen Tür rechts von der Rezeption lassen und im Laufe des Tages abholen. Nehmen Sie den Schlüssel mit, wenn Sie losgehen: Sie geben ihn erst bei Ihrer Rückkehr an der Rezeption ab, sobald Sie Ihr Gepäck abgeholt haben.</p><p>Wir sind eine kleine Unterkunft mit wenigen Zimmern und sehr sicher — die Aufbewahrung wird jedoch nicht beaufsichtigt, daher können wir keine Verantwortung für zurückgelassene Gegenstände übernehmen: Für Ihre Sicherheit empfehlen wir, Ihre wertvollsten Gegenstände bei sich zu behalten.</p>'},
    {i:'🚇',t:'U-Bahn, Bus und Fahrkarten',b:'<p><b>U-Bahn/Bahnhof Tiburtina:</b> Linie B, 10 m entfernt (weniger als 1 Min. zu Fuß) — auch Bahnhof für Hochgeschwindigkeits- und Regionalzüge. Termini 4 Stationen, Kolosseum 6 Stationen.<br>U-Bahn-Öffnungszeiten: So–Do 5:30–23:30 · Fr–Sa 5:30–01:30</p><p><b>Bus:</b> Haltestelle wenige Meter vom Eingang entfernt. Nutzen Sie Google Maps für die beste Route.</p><div class="pills"><span class="pill">1,50 € <small>100 Min.</small></span><span class="pill">7 € <small>24H</small></span><span class="pill">12,50 € <small>48H</small></span><span class="pill">18 € <small>72H</small></span></div><p style="margin-top:8px">🎟️ In der U-Bahn, an Tabakläden, Kiosken oder mit der App <a href="https://www.ticketappy.it">TicketAppy</a>.</p>'},
    {i:'📺',t:'Kostenloses Netflix',b:'<p>Netflix ist kostenlos: Drücken Sie die dafür vorgesehene Taste auf der Fernbedienung, oder wählen Sie den dafür vorgesehenen HDMI-Eingang am Fernseher, um ins Menü zu gelangen und das Netflix-Symbol auszuwählen.</p><p>Falls das Konto abgemeldet ist, schicken Sie uns per WhatsApp ein Foto des QR-Codes auf dem Bildschirm: wir aktivieren es sofort neu.</p>'},
    {i:'🛁',t:'Whirlpool im Zimmer',b:'<p>Ihr Zimmer verfügt über eine Whirlpool-Wanne, einsatzbereit und im Aufenthalt inbegriffen.</p><p>Achten Sie auf den Einschalter: Falls die Massagefunktion nicht startet, prüfen Sie, ob der Schalter neben dem Badezimmerlicht eingeschaltet ist.</p>'},

  acc:[
    {i:'🕐',t:'Check-in a partir das 13:00',b:'<p>Antes das 8:00 não há equipa no local. A partir dessa hora pode passar para deixar a bagagem, mas o quarto não estará disponível até ser libertado pelo hóspede anterior e limpo (até às 13:00).</p><p>Se não encontrar a nossa equipa, encontrará no cofre uma chave única para abrir a porta de entrada: use-a para entrar e depois volte a colocá-la no cofre.</p><p>Pode deixar a bagagem no compartimento logo a seguir à entrada, à direita.</p><p>Quando voltar, encontrará a chave do seu quarto no mesmo cofre.</p>'},

    {i:'🚗',t:'Estacionamento',b:'<p>Acordo com <b>Garage Bologna</b>, a cerca de 200 m: Via Lorenzo il Magnifico 83, tel <b>+39 06 4424 2664</b>.<br>Seg–Sáb 6:00–01:00 · Dom 6:00–10:00 e 19:00–01:00</p><p>25€/dia para veículos standard (tarifa mais alta para carros de grande valor ou de grandes dimensões).</p><p>Há uma garagem mais próxima, logo à direita da nossa entrada, mas com tarifas muito mais altas: a decisão é sua.</p>'},
    {i:'🧳',t:'Guarda-volumes',b:'<p>Pode deixar a bagagem gratuitamente no compartimento da porta branca à direita da receção e recolhê-la durante o dia. Leve a chave consigo quando sair: só a deixará no balcão da receção quando regressar, depois de recolher a bagagem.</p><p>Somos um alojamento pequeno, com poucos quartos e muito seguro — o depósito, no entanto, não é vigiado, por isso não podemos assumir responsabilidade pelo que aí for deixado: para sua tranquilidade, recomendamos que leve consigo os objetos a que dá mais valor.</p>'},
    {i:'🚇',t:'Metro, autocarro e bilhetes',b:'<p><b>Metro/Estação Tiburtina:</b> Linha B, a 10 m (menos de 1 min a pé) — também estação ferroviária de Alta Velocidade e regionais. Termini a 4 paragens, Coliseu a 6.<br>Horário do metro: dom–qui 5:30–23:30 · sex–sáb 5:30–01:30</p><p><b>Autocarro:</b> paragem a poucos metros da entrada. Use o Google Maps para o melhor trajeto.</p><div class="pills"><span class="pill">1,50 € <small>100 min</small></span><span class="pill">7 € <small>24H</small></span><span class="pill">12,50 € <small>48H</small></span><span class="pill">18 € <small>72H</small></span></div><p style="margin-top:8px">🎟️ No metro, em tabacarias, quiosques ou com a app <a href="https://www.ticketappy.it">TicketAppy</a>.</p>'},

/* ================= STATO & RENDER ================= */
const LANGS = [
  {code:'it', flag:'🇮🇹', label:'Italiano'},
  {code:'en', flag:'🇬🇧', label:'English'},
  {code:'es', flag:'🇪🇸', label:'Español'},
  {code:'fr', flag:'🇫🇷', label:'Français'},
  {code:'de', flag:'🇩🇪', label:'Deutsch'},
  {code:'pt', flag:'🇵🇹', label:'Português'},
  {code:'zh', flag:'🇨🇳', label:'中文'}
];
let lang = (navigator.language || 'it').slice(0,2).toLowerCase();
if(!I18N[lang]) lang = 'en';

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const T = () => I18N[lang];

function renderLangUI(){
  const cur = LANGS.find(l => l.code === lang) || LANGS[1];
  $('#langBtn').textContent = cur.flag;
  $('#langModalList').innerHTML = LANGS.map(l =>
    `<button class="lang-row${l.code===lang?' on':''}" data-lang="${l.code}">
       <span class="flag">${l.flag}</span><span>${l.label}</span>
       ${l.code===lang?'<span class="check">✓</span>':''}
     </button>`).join('');
  $$('#langModalList .lang-row').forEach(b => b.addEventListener('click', () => {
    lang = b.dataset.lang;
    render();
    trackEvent('lang', lang);
    $('#langModalOverlay').classList.remove('show');
  }));
}

function render(){
  document.documentElement.lang = lang;
  renderLangUI();
  $$('[data-i]').forEach(el => { const v = T()[el.dataset.i]; if(v !== undefined) el.innerHTML = v; });

  // accordions
  $('#accordions').innerHTML = T().acc.map(a =>
    `<details class="acc"><summary><span class="i">${a.i}</span>${a.t}</summary><div class="body">${a.b}</div></details>`).join('');

  // numeri utili
  $('#numeri').innerHTML = T().numeri.map(n =>
    `<div class="numrow"><span>${n[0]}</span><span>${n[1]}</span><a class="n" href="tel:${n[2]}">${n[2]==='063570'?'06 3570':n[2]==='060606'?'06 0606':n[2]}</a></div>`).join('');

  // servizi
  $('#servizi').innerHTML = T().servizi.map((s,i) =>
    `<div class="card poi" data-poi="${i}">
       <a class="navbtn" href="https://www.google.com/maps/dir/?api=1&destination=${s[4]},${s[5]}" target="_blank" title="Naviga" data-navbtn>
         <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>
       </a>
       <div class="top"><h3>${s[6]==='metro' ? '<span class="m-badge">M</span>' : s[6]==='tabacchi' ? '<span class="t-badge">T</span>' : s[0]} ${s[1]}</h3></div><div class="addr">${s[2]}</div>
     </div>`).join('');
  $$('#servizi .poi').forEach(el => {
    el.querySelectorAll('[data-navbtn]').forEach(nb => nb.addEventListener('click', e => e.stopPropagation()));
    el.addEventListener('click', () => {
      const s = T().servizi[+el.dataset.poi];
      $$('#tabbar button').forEach(x => x.classList.remove('on'));
      $('#tabbar button[data-scr="mappa"]').classList.add('on');
      $$('.screen').forEach(x => x.classList.remove('on'));
      $('#scr-mappa').classList.add('on');
      initMap();
      setTimeout(() => { map.invalidateSize(); zoomToPoi(s[4], s[5]); }, 60);
    });
  });
  refreshMapLabels();

  // food (zona, con filtri) + Roma
  renderFilterChips();
  renderFoodFiltered();
  $('#foodRomaList').innerHTML = T().foodRoma.map(foodCardHTML).join('');
  $$('#foodRomaList [data-navbtn]').forEach(b => b.addEventListener('click', e => e.stopPropagation()));

  // tours
  renderTours();

  $('#farewell').innerHTML = T().farewell;
  $('#chatinput').placeholder = T().chat_ph;
  if(!$('#chatlog').children.length) botSay(T().chat_hello);
}

/* ================= FOOD: card, filtri, mappa ================= */
let foodOverrideList = null; // dati dinamici dal worker, quando disponibili
let foodCuisine = null;      // categoria selezionata (null = tutte)
let foodPrice = null;        // fascia di prezzo selezionata (null = tutte)
let foodMap = null;
let foodMarkers = [];
let foodMapBounds = null;

function foodBaseList(){ return foodOverrideList || T().food; }

function foodCats(f){ return Array.isArray(f[8]) ? f[8] : (f[8] ? [f[8]] : []); }

function foodCardHTML(f){
  const nav = (f[6] != null && f[7] != null)
    ? `https://www.google.com/maps/dir/?api=1&destination=${f[6]},${f[7]}`
    : `https://www.google.com/maps/search/?api=1&query=${f[5]}`;
  const isUrl = f[10] && /^https?:\/\//.test(f[10]);
  const bookHref = isUrl ? f[10] : (f[10] ? `tel:${f[10]}` : '');
  return `<div class="card poi">
    <a class="navbtn" href="${nav}" target="_blank" title="Naviga" data-navbtn>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l18-8-8 18-2-8-8-2z"/></svg>
    </a>
    <div class="top"><h3>${f[0]} ${f[1]}</h3>${f[2]?`<span class="star">★ ${f[2]}</span>`:''}<span class="poi-price${f[2]?'':' pushright'}">${f[11]||f[9]||''}</span></div>
    <div class="addr">${f[3]}</div><div class="desc">${f[4]}</div>
    ${bookHref ? `<a class="book-btn" href="${bookHref}"${isUrl?' target="_blank"':''} data-navbtn>${T().book_cta}</a>` : ''}
  </div>`;
}

function renderFoodFiltered(){
  const match = f => (!foodCuisine || foodCats(f).includes(foodCuisine)) && (!foodPrice || f[9]===foodPrice);
  const all = foodBaseList();
  const filtered = all.filter(match);
  $('#foodlist').innerHTML = filtered.map(foodCardHTML).join('');
  $$('#foodlist .poi').forEach((el, i) => {
    const f = filtered[i];
    el.querySelectorAll('[data-navbtn]').forEach(nb => nb.addEventListener('click', e => e.stopPropagation()));
    if(f[6] != null && f[7] != null){
      el.addEventListener('click', () => {
        initFoodMap();
        setTimeout(() => { foodMap.invalidateSize(); zoomToFoodPoi(f[6], f[7]); }, 60);
      });
    }
  });
  renderFoodMarkers(filtered);

  // stesse regole di filtro applicate alle Perle di Roma
  const perle = (T().foodRoma || []).filter(match);
  const romaEl = $('#foodRomaList');
  if(romaEl){
    romaEl.innerHTML = perle.length ? perle.map(foodCardHTML).join('') : `<p style="opacity:.6;padding:8px 4px">${T().filter_none || '—'}</p>`;
    romaEl.querySelectorAll('[data-navbtn]').forEach(b => b.addEventListener('click', e => e.stopPropagation()));
  }
}

function renderFilterChips(){
  const all = foodBaseList();
  const cuisines = [...new Set(all.flatMap(f => foodCats(f)))];

  const cuisineLabel = foodCuisine ? (T().food_cats[foodCuisine] || foodCuisine) : T().filter_all;
  $('#cuisineFilterBtn').textContent = `${T().filter_cuisine}: ${cuisineLabel}`;

  $('#cuisineModalList').innerHTML = [
    `<button class="lang-row${foodCuisine===null?' on':''}" data-cuisine="">${T().filter_all}${foodCuisine===null?'<span class="check">✓</span>':''}</button>`,
    ...cuisines.map(c => `<button class="lang-row${foodCuisine===c?' on':''}" data-cuisine="${c}">${T().food_cats[c]||c}${foodCuisine===c?'<span class="check">✓</span>':''}</button>`)
  ].join('');
  $$('#cuisineModalList .lang-row').forEach(b => b.addEventListener('click', () => {
    foodCuisine = b.dataset.cuisine || null;
    renderFilterChips(); renderFoodFiltered();
    $('#cuisineModalOverlay').classList.remove('show');
  }));

  const prices = [...new Set(all.map(f => f[9]).filter(Boolean))].sort((a,b)=>a.length-b.length);
  $('#filterPrice').innerHTML = [
    `<button class="chip${foodPrice===null?' on':''}" data-price="">${T().filter_all}</button>`,
    ...prices.map(p => `<button class="chip${foodPrice===p?' on':''}" data-price="${p}">${p}</button>`)
  ].join('');
  $$('#filterPrice .chip').forEach(b => b.addEventListener('click', () => {
    foodPrice = b.dataset.price || null;
    renderFilterChips(); renderFoodFiltered();
  }));
}

function initFoodMap(){
  if(foodMap) return;
  foodMap = L.map('foodMap', {zoomControl:false, attributionControl:true}).setView([CFG.lat, CFG.lon], 15);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 20
  }).addTo(foodMap);
}
function renderFoodMarkers(list){
  if(!foodMap) return;
  foodMarkers.forEach(m => m.remove());
  foodMarkers = [];
  const coords = [];
  list.forEach(f => {
    if(f[6] == null || f[7] == null) return;
    const icon = L.divIcon({className:'', html:`<div class="poi-pin cat-food"><span>${f[0]}</span></div>`, iconSize:[28,28], iconAnchor:[14,28]});
    const m = L.marker([f[6], f[7]], {icon}).addTo(foodMap).bindTooltip(f[1], {direction:'top', offset:[0,-24], className:'poi-tooltip'});
    foodMarkers.push(m);
    coords.push([f[6], f[7]]);
  });
  if(coords.length) foodMapBounds = coords;
  // Vista fissa su casa (vedi nota in initMap): niente fitBounds automatico sui filtri.
}
function zoomToFoodPoi(lat, lon){ if(foodMap) foodMap.flyTo([lat, lon], 18, {duration:0.6}); }
function zoomFoodOverview(){ if(foodMap && foodMapBounds) foodMap.flyToBounds(foodMapBounds, {padding:[36,36], duration:0.6}); }


/* dati dinamici dal worker (quando esisterà) */
function eventCardHTML(e){
  const meta = [e.quando, e.dove].filter(Boolean).join(' · ');
  return `<div class="card"><div class="top"><h3>${e.emoji||'🎭'} ${e.titolo}</h3></div>
    ${meta ? `<div class="addr">${meta}</div>` : ''}<div class="desc">${e.descr||''}</div>
    ${e.link?`<div class="addr" style="margin-top:6px"><a href="${e.link}" target="_blank">${T().eventi_info}</a></div>`:''}</div>`;
}
/* tour FlyTour: caricati dinamicamente da tours.json (fonte condivisa con FlyTour/personale) */
let flytourTours = [];
function renderTours(){
  $('#tours').innerHTML = `<a class="card poi" href="${CFG.flytourAll}" target="_blank">
      <div class="top"><h3>🧭 ${T().tour_all_t}</h3></div>
      <div class="desc">${T().tour_all_d}</div></a>` + flytourTours.map(t => {
    return `<a class="card poi" href="${t.url}" target="_blank">
      <div class="top"><h3>🎧 ${t.title[lang] || t.title.en}</h3>${t.gps === false ? '' : '<span class="badge">GPS</span>'}</div>
      <div class="desc">${t.desc[lang] || t.desc.en}</div>
      <div class="addr" style="margin-top:6px;color:var(--orange);font-weight:700">▶ ${T().tour_cta}</div></a>`;
  }).join('');
}
async function caricaFlytourTours(){
  try{
    const r = await fetch('https://fly98.github.io/FlyTour/tours.json', {signal: AbortSignal.timeout(4000), cache: 'no-store'});
    if(!r.ok) return;
    const all = await r.json();
    flytourTours = all.filter(t => t.city === 'Roma' && t.audience === 'guest');
    renderTours();
  }catch(e){ /* la sezione resta con il solo link "tutti i tour" finché non arrivano dati */ }
}

async function loadDynamic(){
  try{
    const r = await fetch(`${CFG.api}/wb/${CFG.slug}/data?lang=${lang}`, {signal: AbortSignal.timeout(4000)});
    if(!r.ok) return;
    const d = await r.json();
    if(d.food?.length){ foodOverrideList = d.food; renderFilterChips(); renderFoodFiltered(); }
    if(d.eventi?.length){
      $('#eventi').innerHTML = d.eventi.map(eventCardHTML).join('');
    }
    if(d.concerti?.length){
      $('#concerti').innerHTML = d.concerti.map(eventCardHTML).join('');
    }
  }catch(e){/* fallback statico già visibile */}
}

/* ================= TRACKING ================= */
// ID anonimo persistente per dispositivo: nessun dato personale, serve solo a contare visitatori unici
function getOrCreateSid(){
  let sid = localStorage.getItem('wb_sid');
  if(!sid){
    sid = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now()+'-'+Math.random().toString(36).slice(2));
    localStorage.setItem('wb_sid', sid);
  }
  return sid;
}
// esclusione test dalle statistiche: apri con ?notrack=1 una volta per disattivare su questo dispositivo (resta memorizzato); ?notrack=0 per riattivare
(function(){
  const p = new URLSearchParams(location.search).get('notrack');
  if(p === '1') localStorage.setItem('wb_notrack', '1');
  if(p === '0') localStorage.removeItem('wb_notrack');
})();
function trackEvent(event, section){
  if(localStorage.getItem('wb_notrack') === '1') return;
  try{
    fetch(`${CFG.api}/wb/${CFG.slug}/track`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({event, section, lang, sid: getOrCreateSid()}),
      keepalive:true
    }).catch(()=>{});
  }catch(e){/* mai bloccare l'esperienza per un ping di analytics */}
}

/* ================= MAPPA ================= */
let map = null;
let poiMarkers = [];
let mapBounds = null;

function initMap(){
  if(map) return;
  const home = [CFG.lat, CFG.lon];
  map = L.map('map', {zoomControl:false, attributionControl:true}).setView(home, 16);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 20
  }).addTo(map);

  const homeIcon = L.divIcon({className:'', html:'<div class="poi-pin cat-casa"><span>🏠</span></div>', iconSize:[28,28], iconAnchor:[14,28]});
  L.marker(home, {icon:homeIcon}).addTo(map).bindTooltip(CFG.nome, {direction:'top', offset:[0,-24], className:'poi-tooltip'});

  const coords = [home];
  T().servizi.forEach((s,i) => {
    const lat = s[4], lon = s[5], cat = s[6];
    const isFlatBadge = cat === 'metro' || cat === 'tabacchi';
    const glyph = cat === 'metro' ? 'M' : cat === 'tabacchi' ? 'T' : s[0];
    const icon = L.divIcon({
      className: '', html: `<div class="poi-pin cat-${cat}"><span>${glyph}</span></div>`,
      iconSize: isFlatBadge ? [24,24] : [28,28],
      iconAnchor: isFlatBadge ? [12,12] : [14,28]
    });
    poiMarkers[i] = L.marker([lat, lon], {icon}).addTo(map).bindTooltip(s[1], {direction:'top', offset:[0,isFlatBadge?-16:-24], className:'poi-tooltip'});
    coords.push([lat, lon]);
  });
  mapBounds = coords;
  // Vista iniziale fissa e centrata su casa (niente fitBounds automatico: con punti lontani come
  // l'ospedale lo zoom calcolato risultava troppo ampio). "Mostra tutti" resta disponibile a parte.
  map.setView(home, 16);
}
function zoomToPoi(lat, lon){ if(map) map.flyTo([lat, lon], 18, {duration:0.6}); }
function zoomOverview(){ if(map && mapBounds) map.flyToBounds(mapBounds, {padding:[36,36], duration:0.6}); }
function refreshMapLabels(){
  if(!map) return;
  T().servizi.forEach((s,i) => { if(poiMarkers[i]) poiMarkers[i].setTooltipContent(s[1]); });
}
$('#mapOverviewBtn').addEventListener('click', zoomOverview);
$('#foodOverviewBtn').addEventListener('click', zoomFoodOverview);

/* ================= TABS ================= */
$$('#tabbar button').forEach(b => b.addEventListener('click', () => {
  $$('#tabbar button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  $$('.screen').forEach(s => s.classList.remove('on'));
  $('#scr-' + b.dataset.scr).classList.add('on');
  window.scrollTo(0,0);
  trackEvent('tab', b.dataset.scr);
  if(b.dataset.scr === 'mappa'){
    initMap();
    setTimeout(() => map.invalidateSize(), 60);
  }
  if(b.dataset.scr === 'food'){
    initFoodMap();
    renderFoodMarkers(foodBaseList().filter(f => (!foodCuisine || foodCats(f).includes(foodCuisine)) && (!foodPrice || f[9]===foodPrice)));
    setTimeout(() => foodMap.invalidateSize(), 60);
  }
}));

$$('.subtab-row .subtab').forEach(b => b.addEventListener('click', () => {
  $$('.subtab-row .subtab').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  $$('.sub-panel').forEach(p => p.classList.remove('on'));
  $('#panel-' + b.dataset.sub).classList.add('on');
  trackEvent('subtab', b.dataset.sub);
}));

$('#langBtn').addEventListener('click', () => { $('#langModalOverlay').classList.add('show'); });
$('#langModalClose').addEventListener('click', () => { $('#langModalOverlay').classList.remove('show'); });
$('#langModalOverlay').addEventListener('click', e => { if(e.target.id === 'langModalOverlay') e.currentTarget.classList.remove('show'); });

$('#wifiBtn').addEventListener('click', () => {
  $('#wifiSSIDshow').textContent = CFG.wifiSSID;
  $('#wifiPassShow').textContent = CFG.wifiPass;
  $('#wifiModalOverlay').classList.add('show');
  trackEvent('wifi_open', 'casa');
});
$('#wifiModalClose').addEventListener('click', () => { $('#wifiModalOverlay').classList.remove('show'); });
$('#wifiModalOverlay').addEventListener('click', e => { if(e.target.id === 'wifiModalOverlay') e.currentTarget.classList.remove('show'); });
$('#wifiCopyBtn').addEventListener('click', async () => {
  try{ await navigator.clipboard.writeText(CFG.wifiPass); }catch(e){}
  const btn = $('#wifiCopyBtn');
  const original = btn.innerHTML;
  btn.classList.add('copied');
  btn.innerHTML = `<span>${T().wifi_copied}</span>`;
  setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = original; }, 1800);
});
$('#cuisineFilterBtn').addEventListener('click', () => { $('#cuisineModalOverlay').classList.add('show'); });
$('#cuisineModalClose').addEventListener('click', () => { $('#cuisineModalOverlay').classList.remove('show'); });
$('#cuisineModalOverlay').addEventListener('click', e => { if(e.target.id === 'cuisineModalOverlay') e.currentTarget.classList.remove('show'); });

/* ================= CHAT ================= */
const chatHistory = [];
function botSay(txt, withWA){
  const d = document.createElement('div');
  d.className = 'msg bot';
  d.innerHTML = txt + (withWA ? `<br><a href="https://wa.me/${CFG.whatsapp}" target="_blank" style="color:var(--orange);font-weight:700">💬 ${T().chat_wa}</a>` : '');
  $('#chatlog').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}
function guestSay(txt){
  const d = document.createElement('div');
  d.className = 'msg guest'; d.textContent = txt;
  $('#chatlog').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}
async function sendChat(){
  const inp = $('#chatinput');
  const q = inp.value.trim();
  if(!q) return;
  inp.value = '';
  guestSay(q);
  chatHistory.push({role:'user', content:q});
  trackEvent('chat_msg', 'chat');
  try{
    const r = await fetch(`${CFG.api}/wb/${CFG.slug}/chat`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({messages: chatHistory.slice(-10), lang}),
      signal: AbortSignal.timeout(30000)
    });
    if(!r.ok) throw new Error('api');
    const d = await r.json();
    chatHistory.push({role:'assistant', content:d.reply});
    botSay(d.reply.replace(/\n/g,'<br>'));
  }catch(e){
    botSay(T().chat_err, true);
  }
}
$('#chatsend').addEventListener('click', sendChat);
$('#chatinput').addEventListener('keydown', e => { if(e.key === 'Enter') sendChat(); });

/* ================= INIT ================= */
render();
loadDynamic();
caricaFlytourTours();
trackEvent('view', 'casa');
</script>
